<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>北京旅行规划编辑器</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <script type="text/javascript">
        // Load settings from localStorage
        const getStoredSettings = () => {
            try {
                const s = localStorage.getItem('app_settings');
                return s ? JSON.parse(s) : {};
            } catch(e) { return {}; }
        };
        const settings = getStoredSettings();

        // Configure Security Code
        window._AMapSecurityConfig = {
            securityJsCode: settings.amapSecurityCode || 'fbd8f39b3f81d57218c6f3548e561119',
        };

        // Dynamically inject AMap Script
        const jsKey = settings.amapJsKey || '0ea0b8be0dd34998dfb2d9600f6d15cb';
        const script = document.createElement('script');
        script.src = `https://webapi.amap.com/maps?v=2.0&key=${jsKey}&plugin=AMap.Driving,AMap.Walking,AMap.Transfer,AMap.PlaceSearch,AMap.AutoComplete`;
        document.head.appendChild(script);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
